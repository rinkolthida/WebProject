<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Gallery | CSS Only</title>

<style>
/* ===== VARIABLES ===== */
:root {
    --gap: 15px;
    --radius: 12px;
    --bg: #0a0a0a;
}

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", Arial, sans-serif;
}

body {
    background: var(--bg);
    padding: 20px;
}

/* ===== GALLERY GRID ===== */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    grid-auto-rows: 300px;
    gap: var(--gap);
    max-width: 1400px;
    margin: auto;
}

@media (min-width: 900px) {
    .gallery a:first-child {
        grid-column: span 2;
        grid-row: span 2;
    }
}

.gallery a {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius);
    cursor: zoom-in;
}

.gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.gallery a:hover img {
    transform: scale(1.05);
}

/* ===== LIGHTBOX (CSS ONLY) ===== */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 9999;
}

.lightbox:target {
    opacity: 1;
    pointer-events: auto;
}

.lightbox img {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
}

/* ===== CLOSE BUTTON ===== */
.close {
    position: fixed;
    top: 20px;
    right: 25px;
    font-size: 42px;
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- ===== GALLERY ===== -->
<div class="gallery">
    <a href="#img1"><img src="./wall.jpg"></a>
    <a href="#img2"><img src="./wall2.jpg"></a>
    <a href="#img3"><img src="./wall3.jpg"></a>
    <a href="#img4"><img src="./wall4.jpg"></a>
    <a href="#img5"><img src="./wall5.jpg"></a>
    <a href="#img6"><img src="./wall6.jpg"></a>
    <a href="#img7"><img src="./wall7.jpg"></a>
    <a href="#img8"><img src="./wall8.jpg"></a>
    <a href="#img9"><img src="./wall9.png"></a>
    <a href="#img10"><img src="./wall10.jpg"></a>
</div>

<!-- ===== LIGHTBOXES ===== -->
<div id="img1" class="lightbox">
    <a href="#" class="close">&times;</a>
    <img src="./wall.jpg">
</div>

<div id="img2" class="lightbox">
    <a href="#" class="close">&times;</a>
    <img src="./wall2.jpg">
</div>

</div>

<div id="img4" class="lightbox">

</div>

</div>

</div>

</div>

</body>
</html>
